<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenModelCheck v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root {
--bg:#0f1117;--panel:#161b27;--border:#2a3145;
--accent-a:#3b82f6;--accent-b:#10b981;--accent-gold:#f59e0b;--accent-p:#a855f7;
--text:#e2e8f0;--text-dim:#64748b;--text-mid:#94a3b8;
--good:#10b981;--bad:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;letter-spacing:.05em;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent-a);box-shadow:0 0 8px var(--accent-a);animation:pulse 2s infinite;}
.logo-version{font-size:10px;color:var(--accent-p);background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);border-radius:4px;padding:2px 7px;font-family:'JetBrains Mono',monospace;margin-left:4px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header-actions{display:flex;gap:8px;align-items:center;}
.record-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);padding:4px 10px;border:1px solid var(--border);border-radius:20px;}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:500;transition:all .15s;}
.btn-export{background:var(--accent-gold);color:#000;}
.btn-export:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-secondary{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--text-mid);color:var(--text);}
.mode-switcher{display:flex;background:#0d1020;border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px;}
.mode-btn{padding:5px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--text-dim);font-family:'Noto Sans SC',sans-serif;transition:all .2s;}
.mode-btn.active{background:var(--panel);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.5);}
.mode-btn.active.mode-model{color:var(--accent-a);}
.mode-btn.active.mode-prompt{color:var(--accent-p);}
.mode-banner{padding:5px 20px;font-size:11px;font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);flex-shrink:0;}
.banner-model{background:rgba(59,130,246,.06);color:#6ba4e8;}
.banner-prompt{background:rgba(168,85,247,.06);color:#c084fc;}
.config-bar{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0;}
.config-bar.single{grid-template-columns:1fr;}
.model-config{background:var(--panel);padding:10px 16px;display:flex;align-items:center;gap:10px;}
.model-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;flex-shrink:0;}
.badge-a{background:rgba(59,130,246,.15);color:var(--accent-a);border:1px solid rgba(59,130,246,.3);}
.badge-b{background:rgba(16,185,129,.15);color:var(--accent-b);border:1px solid rgba(16,185,129,.3);}
.badge-p{background:rgba(168,85,247,.15);color:var(--accent-p);border:1px solid rgba(168,85,247,.3);}
.config-row{display:flex;gap:6px;flex:1;align-items:center;}
select,input[type=text],input[type=password]{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-size:12px;font-family:'Noto Sans SC',sans-serif;outline:none;transition:border-color .15s;}
select:focus,input:focus{border-color:var(--accent-a);}
.select-type{width:95px;}.input-url{flex:1;min-width:0;}.input-model{width:120px;}.input-key{width:130px;font-family:'JetBrains Mono',monospace;font-size:11px;}
.main{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);flex:1;overflow:hidden;}
.panel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.panel-label{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;}
.panel-label.lp{color:var(--accent-p);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:all .3s;}
.status-dot.loading{background:var(--accent-gold);box-shadow:0 0 6px var(--accent-gold);animation:pulse .8s infinite;}
.status-dot.done-a{background:var(--accent-a);box-shadow:0 0 6px var(--accent-a);}
.status-dot.done-b{background:var(--accent-b);box-shadow:0 0 6px var(--accent-b);}
.response-area{flex:1;overflow-y:auto;padding:14px;font-size:13px;line-height:1.75;color:var(--text-mid);white-space:pre-wrap;word-break:break-word;}
.response-area.empty::before{content:attr(data-placeholder);color:var(--text-dim);font-style:italic;font-size:12px;}
.response-area::-webkit-scrollbar{width:4px;}.response-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.bottom{border-top:1px solid var(--border);background:var(--panel);padding:12px 16px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.prompt-row{display:flex;gap:8px;align-items:flex-end;}
.prompt-input-wrap{flex:1;}
.field-label{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;font-family:'Noto Sans SC',sans-serif;resize:none;outline:none;line-height:1.5;transition:border-color .15s;}
textarea:focus{border-color:var(--accent-a);}
.send-btn{background:var(--accent-a);color:#fff;border:none;border-radius:8px;padding:0 20px;height:60px;cursor:pointer;font-size:13px;font-family:'Noto Sans SC',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.send-btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.send-btn.psend{background:var(--accent-p);}
.prompt-ab-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ab-label{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.ab-label.la{color:var(--accent-a);}.ab-label.lb{color:var(--accent-p);}
.eval-row{display:flex;gap:8px;align-items:flex-end;}
.eval-section{display:flex;flex-direction:column;gap:4px;}
.gsb-group{display:flex;gap:4px;}
.gsb-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:12px;font-family:'Noto Sans SC',sans-serif;font-weight:500;transition:all .15s;color:var(--text-dim);}
.gsb-btn:hover{transform:translateY(-1px);}
.gsb-btn.va{background:rgba(59,130,246,.2);border-color:var(--accent-a);color:var(--accent-a);}
.gsb-btn.vtie{background:rgba(245,158,11,.2);border-color:var(--accent-gold);color:var(--accent-gold);}
.gsb-btn.vb{background:rgba(16,185,129,.2);border-color:var(--accent-b);color:var(--accent-b);}
.gsb-btn.vpb{background:rgba(168,85,247,.2);border-color:var(--accent-p);color:var(--accent-p);}
.tag-select{width:110px;height:31px;}
.eval-note{flex:1;min-height:31px;height:31px;resize:none;}
.save-btn{background:transparent;border:1px solid var(--accent-gold);color:var(--accent-gold);border-radius:8px;padding:0 16px;height:31px;cursor:pointer;font-size:12px;font-family:'Noto Sans SC',sans-serif;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.save-btn:hover{background:rgba(245,158,11,.15);transform:translateY(-1px);}
.records-panel{position:fixed;right:0;top:0;bottom:0;width:400px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:100;}
.records-panel.open{transform:translateX(0);}
.records-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
.records-title{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.06em;}
.close-btn{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:2px 6px;}
.records-list{flex:1;overflow-y:auto;padding:8px;}
.record-item{border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;font-size:12px;background:var(--bg);}
.record-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:4px;}
.record-tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;background:rgba(100,116,139,.15);color:var(--text-dim);border:1px solid var(--border);}
.record-mode-badge{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:3px;}
.mb-model{background:rgba(59,130,246,.1);color:var(--accent-a);border:1px solid rgba(59,130,246,.2);}
.mb-prompt{background:rgba(168,85,247,.1);color:var(--accent-p);border:1px solid rgba(168,85,247,.2);}
.record-verdict{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;}
.rv-a{background:rgba(59,130,246,.15);color:var(--accent-a);}
.rv-tie{background:rgba(245,158,11,.15);color:var(--accent-gold);}
.rv-b{background:rgba(16,185,129,.15);color:var(--accent-b);}
.rv-pb{background:rgba(168,85,247,.15);color:var(--accent-p);}
.record-q{color:var(--text);margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.5;}
.record-note{color:var(--text-dim);font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
.record-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:4px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:12px;line-height:2;}
.sys-toggle{font-size:11px;color:var(--text-dim);cursor:pointer;text-decoration:underline dotted;font-family:'JetBrains Mono',monospace;background:none;border:none;padding:0;}
.sys-prompt-area{display:none;margin-top:4px;}
.sys-prompt-area.visible{display:block;}
.hidden{display:none;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    OpenModelCheck
    <span class="logo-version">v2.0</span>
  </div>
  <div class="mode-switcher">
    <button class="mode-btn mode-model active" onclick="switchMode('model')">⚡ 模型对比</button>
    <button class="mode-btn mode-prompt" onclick="switchMode('prompt')">🧪 Prompt A/B</button>
  </div>
  <div class="header-actions">
    <span class="record-count" id="recordCount">0 条记录</span>
    <button class="btn btn-secondary" onclick="toggleRecords()">📋 记录列表</button>
    <button class="btn btn-export" onclick="exportCSV()">⬇ 导出 Excel</button>
    <button class="btn btn-secondary" onclick="clearAll()">清空</button>
  </div>
</header>

<div class="mode-banner banner-model" id="modeBanner">
  MODEL MODE · 同一 Prompt，对比两个模型的输出差异
</div>

<!-- Model mode config -->
<div class="config-bar" id="cfgModel">
  <div class="model-config">
    <span class="model-badge badge-a">MODEL A</span>
    <div class="config-row">
      <select class="select-type" id="typeA" onchange="updatePH('A')">
        <option value="ollama">Ollama</option><option value="openai">OpenAI兼容</option><option value="anthropic">Anthropic</option>
      </select>
      <input type="text" class="input-url" id="urlA" placeholder="http://localhost:11434"/>
      <input type="text" class="input-model" id="modelA" placeholder="模型名称"/>
      <input type="password" class="input-key" id="keyA" placeholder="API Key（可选）"/>
    </div>
  </div>
  <div class="model-config">
    <span class="model-badge badge-b">MODEL B</span>
    <div class="config-row">
      <select class="select-type" id="typeB" onchange="updatePH('B')">
        <option value="ollama">Ollama</option><option value="openai">OpenAI兼容</option><option value="anthropic">Anthropic</option>
      </select>
      <input type="text" class="input-url" id="urlB" placeholder="http://localhost:11434"/>
      <input type="text" class="input-model" id="modelB" placeholder="模型名称"/>
      <input type="password" class="input-key" id="keyB" placeholder="API Key（可选）"/>
    </div>
  </div>
</div>

<!-- Prompt mode config -->
<div class="config-bar single hidden" id="cfgPrompt">
  <div class="model-config">
    <span class="model-badge badge-p">单模型</span>
    <div class="config-row">
      <select class="select-type" id="typeP" onchange="updatePHP()">
        <option value="ollama">Ollama</option><option value="openai">OpenAI兼容</option><option value="anthropic">Anthropic</option>
      </select>
      <input type="text" class="input-url" id="urlP" placeholder="http://localhost:11434"/>
      <input type="text" class="input-model" id="modelP" placeholder="模型名称"/>
      <input type="password" class="input-key" id="keyP" placeholder="API Key（可选）"/>
    </div>
  </div>
</div>

<!-- Results -->
<div class="main">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label" id="lblL">Model A · 输出结果</span>
      <span class="status-dot" id="dotA"></span>
    </div>
    <div class="response-area empty" id="respA" data-placeholder="等待发送问题..."></div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label" id="lblR">Model B · 输出结果</span>
      <span class="status-dot" id="dotB"></span>
    </div>
    <div class="response-area empty" id="respB" data-placeholder="等待发送问题..."></div>
  </div>
</div>

<!-- Bottom: Model mode -->
<div class="bottom" id="btmModel">
  <div>
    <button class="sys-toggle" onclick="document.getElementById('sysM').classList.toggle('visible')">⚙ 系统提示词（可选，两个模型共用）</button>
    <div class="sys-prompt-area" id="sysM"><textarea id="sysPrompt" style="min-height:44px" placeholder="输入系统提示词..."></textarea></div>
  </div>
  <div class="prompt-row">
    <div class="prompt-input-wrap">
      <div class="field-label">问题输入（Ctrl+Enter 发送）</div>
      <textarea id="promptInput" style="min-height:60px" placeholder="输入你的问题，两个模型同时响应..." onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))sendModel()"></textarea>
    </div>
    <button class="send-btn" id="sendM" onclick="sendModel()">▶ 发 送</button>
  </div>
  <div class="eval-row">
    <div class="eval-section">
      <div class="field-label">评估结论</div>
      <div class="gsb-group">
        <button class="gsb-btn" data-v="A" onclick="setV('A')">A 更好</button>
        <button class="gsb-btn" data-v="=" onclick="setV('=')">相 当</button>
        <button class="gsb-btn" data-v="B" onclick="setV('B')">B 更好</button>
      </div>
    </div>
    <div class="eval-section">
      <div class="field-label">场景标签</div>
      <select class="tag-select" id="tagM"><option>安全类</option><option>质量类</option><option>事实类</option><option>指令遵循</option><option>创意类</option><option>其他</option></select>
    </div>
    <div class="eval-section" style="flex:1">
      <div class="field-label">评估备注</div>
      <textarea class="eval-note" id="noteM" placeholder="填写评估理由..."></textarea>
    </div>
    <button class="save-btn" id="saveM" onclick="saveModel()">💾 保存记录</button>
  </div>
</div>

<!-- Bottom: Prompt A/B mode -->
<div class="bottom hidden" id="btmPrompt">
  <div>
    <button class="sys-toggle" onclick="document.getElementById('sysP').classList.toggle('visible')">⚙ 系统提示词（可选）</button>
    <div class="sys-prompt-area" id="sysP"><textarea id="sysPText" style="min-height:44px" placeholder="输入系统提示词..."></textarea></div>
  </div>
  <div class="prompt-ab-row">
    <div>
      <div class="ab-label la">● Prompt A — 写法一</div>
      <textarea id="pA" style="min-height:56px" placeholder="输入 Prompt A 的写法..." onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))sendPromptAB()"></textarea>
    </div>
    <div>
      <div class="ab-label lb">● Prompt B — 写法二</div>
      <textarea id="pB" style="min-height:56px" placeholder="输入 Prompt B 的写法..." onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))sendPromptAB()"></textarea>
    </div>
  </div>
  <div class="prompt-row">
    <div class="prompt-input-wrap">
      <div class="field-label">测试问题（两种 Prompt 分别用此问题调用同一模型）</div>
      <textarea id="qAB" style="min-height:44px" placeholder="输入要测试的问题..." onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))sendPromptAB()"></textarea>
    </div>
    <button class="send-btn psend" id="sendP" onclick="sendPromptAB()">▶ 发 送</button>
  </div>
  <div class="eval-row">
    <div class="eval-section">
      <div class="field-label">哪个Prompt更好</div>
      <div class="gsb-group">
        <button class="gsb-btn" data-pv="PA" onclick="setPV('PA')">Prompt A 更好</button>
        <button class="gsb-btn" data-pv="=" onclick="setPV('=')">相 当</button>
        <button class="gsb-btn" data-pv="PB" onclick="setPV('PB')">Prompt B 更好</button>
      </div>
    </div>
    <div class="eval-section">
      <div class="field-label">场景标签</div>
      <select class="tag-select" id="tagP"><option>安全类</option><option>质量类</option><option>事实类</option><option>指令遵循</option><option>创意类</option><option>其他</option></select>
    </div>
    <div class="eval-section" style="flex:1">
      <div class="field-label">差异观察</div>
      <textarea class="eval-note" id="noteP" placeholder="哪里不同，为什么更好..."></textarea>
    </div>
    <button class="save-btn" id="saveP" onclick="savePromptAB()">💾 保存记录</button>
  </div>
</div>

<!-- Records -->
<div class="records-panel" id="recordsPanel">
  <div class="records-header">
    <span class="records-title">EVAL RECORDS</span>
    <button class="close-btn" onclick="toggleRecords()">✕</button>
  </div>
  <div class="records-list" id="recordsList">
    <div class="empty-state">暂无记录<br>发送问题并保存评估后<br>记录将显示在这里</div>
  </div>
</div>

<script>
let records=[],vM=null,vP=null;
let curPrompt='',curRA='',curRB='';
let curPA='',curPB='',curQ='',curRPA='',curRPB='';

function switchMode(m){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.mode-btn.mode-'+m).classList.add('active');
  const isM=m==='model';
  document.getElementById('cfgModel').classList.toggle('hidden',!isM);
  document.getElementById('cfgPrompt').classList.toggle('hidden',isM);
  document.getElementById('btmModel').classList.toggle('hidden',!isM);
  document.getElementById('btmPrompt').classList.toggle('hidden',isM);
  document.getElementById('modeBanner').className='mode-banner '+(isM?'banner-model':'banner-prompt');
  document.getElementById('modeBanner').textContent=isM
    ?'MODEL MODE · 同一 Prompt，对比两个模型的输出差异'
    :'PROMPT A/B MODE · 同一模型，对比两种 Prompt 写法的效果差异';
  document.getElementById('lblL').textContent=isM?'Model A · 输出结果':'Prompt A · 输出结果';
  document.getElementById('lblL').className='panel-label'+(isM?'':' lp');
  document.getElementById('lblR').textContent=isM?'Model B · 输出结果':'Prompt B · 输出结果';
  document.getElementById('lblR').className='panel-label'+(isM?'':' lp');
  ['A','B'].forEach(s=>{const r=document.getElementById('resp'+s);r.textContent='';r.classList.add('empty');document.getElementById('dot'+s).className='status-dot';});
}

function updatePH(s){const t=document.getElementById('type'+s).value;const u=document.getElementById('url'+s);u.placeholder=t==='ollama'?'http://localhost:11434':t==='openai'?'https://api.openai.com':'https://api.anthropic.com';}
function updatePHP(){const t=document.getElementById('typeP').value;const u=document.getElementById('urlP');u.placeholder=t==='ollama'?'http://localhost:11434':t==='openai'?'https://api.openai.com':'https://api.anthropic.com';}
function toggleRecords(){document.getElementById('recordsPanel').classList.toggle('open');}

function setV(v){vM=v;document.querySelectorAll('.gsb-btn[data-v]').forEach(b=>b.classList.remove('va','vtie','vb'));const m={'A':'va','=':'vtie','B':'vb'};document.querySelector(`.gsb-btn[data-v="${v}"]`).classList.add(m[v]);}
function setPV(v){vP=v;document.querySelectorAll('.gsb-btn[data-pv]').forEach(b=>b.classList.remove('va','vtie','vpb'));const m={'PA':'va','=':'vtie','PB':'vpb'};document.querySelector(`.gsb-btn[data-pv="${v}"]`).classList.add(m[v]);}

async function callAPI(cfg){
  const{type,url,model,key,sys,prompt,dotId,respId}=cfg;
  const dot=document.getElementById(dotId),resp=document.getElementById(respId);
  dot.className='status-dot loading';resp.textContent='';resp.classList.remove('empty');
  let result='';
  try{
    const base=(url||'http://localhost:11434').replace(/\/$/,'');
    if(type==='ollama'){
      const msgs=[];if(sys)msgs.push({role:'system',content:sys});msgs.push({role:'user',content:prompt});
      const r=await fetch(`${base}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:model||'llama3',messages:msgs,stream:true})});
      const reader=r.body.getReader();const dec=new TextDecoder();
      while(true){const{done,value}=await reader.read();if(done)break;for(const line of dec.decode(value).split('\n')){if(!line.trim())continue;try{const j=JSON.parse(line);if(j.message?.content){result+=j.message.content;resp.textContent=result;}}catch{}}}
    }else if(type==='openai'){
      const msgs=[];if(sys)msgs.push({role:'system',content:sys});msgs.push({role:'user',content:prompt});
      const r=await fetch(`${base}/v1/chat/completions`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model:model||'gpt-4o',messages:msgs,stream:true})});
      const reader=r.body.getReader();const dec=new TextDecoder();
      while(true){const{done,value}=await reader.read();if(done)break;for(const line of dec.decode(value).split('\n')){if(!line.startsWith('data: ')||line.includes('[DONE]'))continue;try{const j=JSON.parse(line.slice(6));result+=j.choices?.[0]?.delta?.content||'';resp.textContent=result;}catch{}}}
    }else{
      const body={model:model||'claude-sonnet-4-20250514',max_tokens:2048,messages:[{role:'user',content:prompt}],stream:true};
      if(sys)body.system=sys;
      const r=await fetch(`${base}/v1/messages`,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
      const reader=r.body.getReader();const dec=new TextDecoder();
      while(true){const{done,value}=await reader.read();if(done)break;for(const line of dec.decode(value).split('\n')){if(!line.startsWith('data: '))continue;try{const j=JSON.parse(line.slice(6));if(j.delta?.text){result+=j.delta.text;resp.textContent=result;}}catch{}}}
    }
    dot.className='status-dot done-'+(dotId==='dotA'?'a':'b');
  }catch(e){resp.textContent='❌ 请求失败：'+e.message;dot.className='status-dot';}
  return result;
}

async function sendModel(){
  const prompt=document.getElementById('promptInput').value.trim();if(!prompt)return;
  curPrompt=prompt;curRA='';curRB='';vM=null;
  document.querySelectorAll('.gsb-btn[data-v]').forEach(b=>b.classList.remove('va','vtie','vb'));
  const btn=document.getElementById('sendM');btn.disabled=true;btn.textContent='请求中...';
  const sys=document.getElementById('sysPrompt').value.trim();
  const[a,b]=await Promise.all([
    callAPI({type:document.getElementById('typeA').value,url:document.getElementById('urlA').value,model:document.getElementById('modelA').value,key:document.getElementById('keyA').value,sys,prompt,dotId:'dotA',respId:'respA'}),
    callAPI({type:document.getElementById('typeB').value,url:document.getElementById('urlB').value,model:document.getElementById('modelB').value,key:document.getElementById('keyB').value,sys,prompt,dotId:'dotB',respId:'respB'})
  ]);
  curRA=a;curRB=b;btn.disabled=false;btn.textContent='▶ 发 送';
}

async function sendPromptAB(){
  const pa=document.getElementById('pA').value.trim(),pb=document.getElementById('pB').value.trim(),q=document.getElementById('qAB').value.trim();
  if(!pa||!pb||!q){alert('请填写 Prompt A、Prompt B 和测试问题');return;}
  curPA=pa;curPB=pb;curQ=q;curRPA='';curRPB='';vP=null;
  document.querySelectorAll('.gsb-btn[data-pv]').forEach(b=>b.classList.remove('va','vtie','vpb'));
  const btn=document.getElementById('sendP');btn.disabled=true;btn.textContent='请求中...';
  const sys=document.getElementById('sysPText').value.trim();
  const type=document.getElementById('typeP').value,url=document.getElementById('urlP').value,model=document.getElementById('modelP').value,key=document.getElementById('keyP').value;
  const[a,b]=await Promise.all([
    callAPI({type,url,model,key,sys,prompt:pa+'\n\n'+q,dotId:'dotA',respId:'respA'}),
    callAPI({type,url,model,key,sys,prompt:pb+'\n\n'+q,dotId:'dotB',respId:'respB'})
  ]);
  curRPA=a;curRPB=b;btn.disabled=false;btn.textContent='▶ 发 送';
}

function saveModel(){
  if(!curPrompt){alert('请先发送一个问题');return;}
  records.push({id:Date.now(),time:new Date().toLocaleString('zh-CN'),mode:'模型对比',prompt:curPrompt,labelA:document.getElementById('modelA').value||'Model A',labelB:document.getElementById('modelB').value||'Model B',respA:curRA,respB:curRB,verdict:vM||'未评估',tag:document.getElementById('tagM').value,note:document.getElementById('noteM').value.trim()});
  flash('noteM','saveM');vM=null;document.querySelectorAll('.gsb-btn[data-v]').forEach(b=>b.classList.remove('va','vtie','vb'));
}

function savePromptAB(){
  if(!curQ){alert('请先发送一个问题');return;}
  records.push({id:Date.now(),time:new Date().toLocaleString('zh-CN'),mode:'Prompt A/B',prompt:curQ,labelA:'Prompt A',labelB:'Prompt B',respA:curRPA,respB:curRPB,verdict:vP||'未评估',tag:document.getElementById('tagP').value,note:document.getElementById('noteP').value.trim(),promptA:curPA,promptB:curPB});
  flash('noteP','saveP');vP=null;document.querySelectorAll('.gsb-btn[data-pv]').forEach(b=>b.classList.remove('va','vtie','vpb'));
}

function flash(noteId,btnId){
  updateUI();document.getElementById(noteId).value='';
  const btn=document.getElementById(btnId);
  btn.textContent='✓ 已保存';btn.style.cssText='border-color:var(--good);color:var(--good);';
  setTimeout(()=>{btn.textContent='💾 保存记录';btn.style.cssText='';},1500);
}

function updateUI(){
  document.getElementById('recordCount').textContent=`${records.length} 条记录`;
  const list=document.getElementById('recordsList');
  if(!records.length){list.innerHTML='<div class="empty-state">暂无记录<br>发送问题并保存评估后<br>记录将显示在这里</div>';return;}
  const vm={'A':{c:'rv-a',l:'A 更好'},'=':{c:'rv-tie',l:'相 当'},'B':{c:'rv-b',l:'B 更好'},'PA':{c:'rv-a',l:'Prompt A 更好'},'PB':{c:'rv-pb',l:'Prompt B 更好'},'未评估':{c:'',l:'未评估'}};
  list.innerHTML=[...records].reverse().map(r=>{const v=vm[r.verdict]||vm['未评估'];const mc=r.mode==='模型对比'?'mb-model':'mb-prompt';return`<div class="record-item"><div class="record-meta"><span class="record-mode-badge ${mc}">${r.mode}</span><span class="record-tag">${r.tag}</span><span class="record-verdict ${v.c}">${v.l}</span></div><div class="record-q">${r.prompt}</div>${r.note?`<div class="record-note">${r.note}</div>`:''}<div class="record-time">${r.time} · ${r.labelA} vs ${r.labelB}</div></div>`;}).join('');
}

function exportCSV(){
  if(!records.length){alert('暂无记录可导出');return;}
  const h=['时间','模式','问题','对比项A','输出A','对比项B','输出B','评估结论','场景标签','备注','PromptA内容','PromptB内容'];
  const vm={'A':'A更好','=':'相当','B':'B更好','PA':'PromptA更好','PB':'PromptB更好','未评估':'未评估'};
  const rows=records.map(r=>[r.time,r.mode,r.prompt,r.labelA,r.respA,r.labelB,r.respB,vm[r.verdict]||r.verdict,r.tag,r.note,r.promptA||'',r.promptB||'']);
  const csv='\uFEFF'+[h,...rows].map(row=>row.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`OpenModelCheck_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.csv`;a.click();
}

function clearAll(){
  if(records.length&&!confirm('确定清空所有记录？'))return;
  records=[];curPrompt='';curRA='';curRB='';curQ='';curRPA='';curRPB='';updateUI();
  ['A','B'].forEach(s=>{const r=document.getElementById('resp'+s);r.textContent='';r.classList.add('empty');document.getElementById('dot'+s).className='status-dot';});
}
</script>
